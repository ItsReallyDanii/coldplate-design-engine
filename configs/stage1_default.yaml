# Stage 1 Default Configuration
# 2D cold-plate evaluation sweep

output_dir: "results/stage1_2d"

# Grid configuration
grid:
  nx: 200  # pixels
  ny: 200  # pixels
  dx: 1.0e-4  # meters (100 microns)
  dy: 1.0e-4  # meters (100 microns)

# Baseline families to evaluate
families:
  - straight_channel
  - serpentine_channel
  - pin_fin
  - gyroid_2d
  - diamond_2d
  - primitive_2d

# Parameter ranges for each family
param_ranges:
  straight_channel:
    num_channels: [2, 4, 8, 12]
    channel_width_fraction: [0.3, 0.4, 0.5, 0.6]
  
  serpentine_channel:
    channel_width_px: [8, 12, 16]
    turn_radius_px: [15, 20, 25]
    num_passes: [3, 5, 7]
  
  pin_fin:
    pin_diameter_px: [6, 10, 14]
    pin_spacing_px: [25, 35, 45]
    offset_rows: [true, false]
  
  gyroid_2d:
    wavelength_px: [20, 30, 40]
    threshold: [-0.1, 0.0, 0.1]
  
  diamond_2d:
    wavelength_px: [20, 30, 40]
    threshold: [-0.1, 0.0, 0.1]
  
  primitive_2d:
    wavelength_px: [20, 30, 40]
    threshold: [-0.1, 0.0, 0.1]

# Random seed settings
seed_start: 0
num_samples_per_config: 1
